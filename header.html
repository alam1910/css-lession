<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Landing Page</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Header */
header {
  background: darkblue;
  color: white;
  padding: 15px;
  text-align: center;
}

/* Hero Section */
.hero {
  background: lightblue;
  padding: 60px 20px;
  text-align: center;
}

.hero h1 {
  margin-bottom: 10px;
}

.hero button {
  padding: 10px 20px;
  border: none;
  background: darkblue;
  color: white;
  cursor:all-scroll;
  border-radius: 5px;
}

/* Content Section */
.section {
  padding: 40px 20px;
  display: flex;
  gap: 20px;
}

.box {
  flex: 1;
  background: lightgray;
  padding: 20px;
  text-align: center;
  border-radius: 8px;
}

/* Responsive */
@media (max-width: 768px) {
  .section {
    flex-direction: column;
  }
}

</style>
</head>

<body>

    <header>
    আমার ওয়েবসাইট 😄
    </header>

    <section class="hero">
        <h1>স্বাগতম!</h1>
        <p>আমি HTML + CSS শিখছি 🔥</p>
        <button>আরও জানুন</button>
    </section>

    <section class="section">
        <div class="box">Feature 1</div>
        <div class="box">Feature 2</div>
        <div class="box">Feature 3</div>
    </section>

</body>
</html>
