<!DOCTYPE html>
<html>
<head>
<style>

body {
  font-family: Arial;
  text-align: center;
  padding: 50px;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  background: darkblue;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.5s;
}

button:hover {
  background: orange;
  transform: scale(10.5);
}

</style>
</head>

<body>

<button>Click Me 😄</button>

</body>
</html>
